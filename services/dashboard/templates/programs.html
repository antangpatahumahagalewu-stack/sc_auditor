{% extends "base.html" %}
{% block content %}

<div class="mb-6">
    <h2 class="text-2xl font-bold">Immunefi Programs</h2>
    <p class="dark:text-[#a1a1aa] light:text-[#71717a] mt-1">Browse monitored bug bounty programs</p>
</div>

<!-- Filters -->
<div class="card mb-6">
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
            <label class="block text-xs font-medium dark:text-[#a1a1aa] light:text-[#71717a] mb-1">Search</label>
            <input type="text" id="filter-search" class="input-field" placeholder="program name..." oninput="loadPrograms()">
        </div>
        <div>
            <label class="block text-xs font-medium dark:text-[#a1a1aa] light:text-[#71717a] mb-1">Chain</label>
            <select id="filter-chain" class="input-field" onchange="loadPrograms()">
                <option value="">All Chains</option>
                <option value="ethereum">Ethereum</option>
                <option value="bsc">BSC</option>
                <option value="polygon">Polygon</option>
                <option value="arbitrum">Arbitrum</option>
                <option value="optimism">Optimism</option>
                <option value="avalanche">Avalanche</option>
                <option value="solana">Solana</option>
            </select>
        </div>
    </div>
</div>

<!-- Programs Grid -->
<div id="programs-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
    <div class="card col-span-full">
        <div class="text-center py-8 dark:text-[#a1a1aa] light:text-[#71717a]">Loading programs...</div>
    </div>
</div>

<script>
    async function loadPrograms() {
        const search = document.getElementById('filter-search').value;
        const chain = document.getElementById('filter-chain').value;
        const params = new URLSearchParams();
        if (search) params.set('search', search);
        if (chain) params.set('chain', chain);

        try {
            const resp = await fetch('/api/programs?' + params.toString());
            const json = await resp.json();
            const items = json.data || [];
            const grid = document.getElementById('programs-grid');

            if (items.length === 0) {
                grid.innerHTML = '<div class="card col-span-full"><div class="text-center py-8 dark:text-[#a1a1aa]">No programs found</div></div>';
                return;
            }

            grid.innerHTML = items.map(p => `
                <div class="card card-hover cursor-pointer" onclick="window.location='/programs/${p.slug}'">
                    <div class="flex items-start justify-between mb-3">
                        <h3 class="font-semibold text-sm">${p.name || p.slug}</h3>
                        <span class="badge ${p.status === 'active' ? 'bg-green-500/20 text-green-400' : 'bg-yellow-500/20 text-yellow-400'}">${p.status || 'active'}</span>
                    </div>
                    ${p.max_bounty ? `<div class="text-sm mb-2">Max Bounty: <strong class="text-vyper-400">${p.max_bounty}</strong></div>` : ''}
                    <div class="flex flex-wrap gap-1">
                        ${(p.chains || []).map(c => `<span class="badge bg-blue-500/10 text-blue-400 text-[10px]">${c}</span>`).join('')}
                        ${(!p.chains || p.chains.length === 0) ? '<span class="text-xs dark:text-[#a1a1aa]">No chains listed</span>' : ''}
                    </div>
                </div>
            `).join('');
        } catch (err) {
            console.error('Load programs error:', err);
        }
    }

    document.addEventListener('DOMContentLoaded', loadPrograms);
</script>
{% endblock %}
