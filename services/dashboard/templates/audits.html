{% extends "base.html" %}
{% block content %}

<div class="mb-6">
    <h2 class="text-2xl font-bold">Audits</h2>
    <p class="dark:text-[#a1a1aa] light:text-[#71717a] mt-1">Search, filter, and inspect all audit runs</p>
</div>

<!-- Filters -->
<div class="card mb-6">
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
        <div>
            <label class="block text-xs font-medium dark:text-[#a1a1aa] light:text-[#71717a] mb-1">Search</label>
            <input type="text" id="filter-search" class="input-field" placeholder="audit ID, program..." oninput="loadAudits()">
        </div>
        <div>
            <label class="block text-xs font-medium dark:text-[#a1a1aa] light:text-[#71717a] mb-1">Status</label>
            <select id="filter-status" class="input-field" onchange="loadAudits()">
                <option value="">All Statuses</option>
                <option value="PENDING">Pending</option>
                <option value="SCANNING">Scanning</option>
                <option value="AI_ANALYSIS">AI Analysis</option>
                <option value="COMPLETED">Completed</option>
                <option value="FAILED">Failed</option>
            </select>
        </div>
        <div>
            <label class="block text-xs font-medium dark:text-[#a1a1aa] light:text-[#71717a] mb-1">Chain</label>
            <select id="filter-chain" class="input-field" onchange="loadAudits()">
                <option value="">All Chains</option>
                <option value="ethereum">Ethereum</option>
                <option value="bsc">BSC</option>
                <option value="polygon">Polygon</option>
                <option value="arbitrum">Arbitrum</option>
                <option value="optimism">Optimism</option>
                <option value="avalanche">Avalanche</option>
            </select>
        </div>
        <div>
            <label class="block text-xs font-medium dark:text-[#a1a1aa] light:text-[#71717a] mb-1">Program</label>
            <input type="text" id="filter-program" class="input-field" placeholder="program slug..." oninput="loadAudits()">
        </div>
    </div>
</div>

<!-- Table -->
<div class="card">
    <div class="overflow-x-auto">
        <table class="w-full">
            <thead>
                <tr>
                    <th class="table-header text-left">Audit ID</th>
                    <th class="table-header text-left">Program</th>
                    <th class="table-header text-left">Contract</th>
                    <th class="table-header text-left">Chain</th>
                    <th class="table-header text-left">Status</th>
                    <th class="table-header text-right">Findings</th>
                    <th class="table-header text-left">Severity</th>
                    <th class="table-header text-right">Duration</th>
                    <th class="table-header text-left">Date</th>
                    <th class="table-header text-left">Actions</th>
                </tr>
            </thead>
            <tbody id="audits-body">
                <tr class="table-row">
                    <td class="table-cell" colspan="10" class="text-center dark:text-[#a1a1aa]">Loading...</td>
                </tr>
            </tbody>
        </table>
    </div>
    <div class="flex items-center justify-between mt-4 pt-4 border-t dark:border-[#27272a] light:border-[#e4e4e7]">
        <span class="text-sm dark:text-[#a1a1aa] light:text-[#71717a]" id="audits-count">0 audits</span>
        <div class="flex gap-2">
            <button onclick="prevPage()" class="btn-secondary text-sm px-3 py-1" id="btn-prev" disabled>← Prev</button>
            <button onclick="nextPage()" class="btn-secondary text-sm px-3 py-1" id="btn-next">Next →</button>
        </div>
    </div>
</div>

<script>
    let currentOffset = 0;
    const PAGE_SIZE = 25;

    async function loadAudits() {
        const search = document.getElementById('filter-search').value;
        const status = document.getElementById('filter-status').value;
        const chain = document.getElementById('filter-chain').value;
        const program = document.getElementById('filter-program').value;

        const params = new URLSearchParams({
            limit: PAGE_SIZE,
            offset: currentOffset,
        });
        if (status) params.set('state', status);
        if (chain) params.set('chain', chain);
        if (program) params.set('program', program);

        try {
            const resp = await fetch('/api/audits?' + params.toString());
            const json = await resp.json();
            const items = json.data || [];
            const total = json.meta?.total || items.length;

            document.getElementById('audits-count').textContent = `${total} audits (${items.length} shown)`;
            document.getElementById('btn-prev').disabled = currentOffset <= 0;
            document.getElementById('btn-next').disabled = items.length < PAGE_SIZE;

            const tbody = document.getElementById('audits-body');
            if (items.length === 0) {
                tbody.innerHTML = '<tr class="table-row"><td class="table-cell" colspan="10" class="text-center dark:text-[#a1a1aa]">No audits found</td></tr>';
                return;
            }

            tbody.innerHTML = items.map(a => `
                <tr class="table-row cursor-pointer" onclick="window.location='/audits/${a.audit_id}'">
                    <td class="table-cell font-mono text-xs">${a.audit_id?.slice(0, 8) || '—'}...</td>
                    <td class="table-cell">${a.program || '—'}</td>
                    <td class="table-cell font-mono text-xs">${a.address ? a.address.slice(0, 10) + '...' : '—'}</td>
                    <td class="table-cell">${a.chain || '—'}</td>
                    <td class="table-cell">${statusBadge(a.state || 'PENDING')}</td>
                    <td class="table-cell text-right">${a.findings_count ?? '—'}</td>
                    <td class="table-cell">${severityBadges(a)}</td>
                    <td class="table-cell text-right font-mono text-xs">${a.duration_seconds ? formatDuration(a.duration_seconds) : '—'}</td>
                    <td class="table-cell text-xs">${a.created_at ? new Date(a.created_at).toLocaleDateString() : '—'}</td>
                    <td class="table-cell">
                        ${(a.state === 'FAILED' || a.state?.endsWith('_FAILED')) ? `<button onclick="event.stopPropagation();retryAudit('${a.audit_id}')" class="text-xs text-vyper-400 hover:text-vyper-300">Retry</button>` : ''}
                    </td>
                </tr>
            `).join('');
        } catch (err) {
            console.error('Load audits error:', err);
        }
    }

    function statusBadge(state) {
        const colors = {
            'COMPLETED': 'bg-green-500/20 text-green-400',
            'PENDING': 'bg-yellow-500/20 text-yellow-400',
            'FETCHING_PROGRAM': 'bg-blue-500/20 text-blue-400',
            'FETCHING_SOURCE': 'bg-blue-500/20 text-blue-400',
            'SCANNING': 'bg-purple-500/20 text-purple-400',
            'AI_ANALYSIS': 'bg-indigo-500/20 text-indigo-400',
            'CLASSIFYING': 'bg-cyan-500/20 text-cyan-400',
            'EXPLOITING': 'bg-orange-500/20 text-orange-400',
            'REPORTING': 'bg-pink-500/20 text-pink-400',
            'NOTIFYING': 'bg-teal-500/20 text-teal-400',
        };
        if (state?.endsWith('_FAILED') || state === 'TIMEOUT') {
            return '<span class="badge bg-red-500/20 text-red-400">' + state + '</span>';
        }
        const color = colors[state] || 'bg-gray-500/20 text-gray-400';
        return `<span class="badge ${color}">${state}</span>`;
    }

    function severityBadges(a) {
        const parts = [];
        if (a.critical_count) parts.push(`<span class="badge bg-red-500/20 text-red-400 mr-1">${a.critical_count}C</span>`);
        if (a.high_count) parts.push(`<span class="badge bg-orange-500/20 text-orange-400 mr-1">${a.high_count}H</span>`);
        if (a.medium_count) parts.push(`<span class="badge bg-yellow-500/20 text-yellow-400 mr-1">${a.medium_count}M</span>`);
        if (a.low_count) parts.push(`<span class="badge bg-blue-500/20 text-blue-400">${a.low_count}L</span>`);
        return parts.join('') || '—';
    }

    function formatDuration(sec) {
        if (sec < 60) return Math.round(sec) + 's';
        if (sec < 3600) return Math.floor(sec / 60) + 'm ' + Math.round(sec % 60) + 's';
        return Math.floor(sec / 3600) + 'h ' + Math.floor((sec % 3600) / 60) + 'm';
    }

    function prevPage() {
        if (currentOffset > 0) {
            currentOffset -= PAGE_SIZE;
            loadAudits();
        }
    }

    function nextPage() {
        currentOffset += PAGE_SIZE;
        loadAudits();
    }

    async function retryAudit(auditId) {
        try {
            await fetch('/api/audits/' + auditId + '/retry', { method: 'POST' });
            loadAudits();
        } catch (err) {
            console.error('Retry error:', err);
        }
    }

    document.addEventListener('DOMContentLoaded', loadAudits);
</script>
{% endblock %}
