{% extends "base.html" %}
{% block content %}

<div class="mb-6 flex items-center gap-3">
    <a href="/programs" class="text-sm dark:text-[#a1a1aa] light:text-[#71717a] hover:text-vyper-400">← Back to Programs</a>
    <span class="dark:text-[#3f3f46] light:text-[#d4d4d8]">/</span>
    <h2 class="text-2xl font-bold" id="program-name">{{ slug }}</h2>
</div>

<div id="program-detail-content">
    <div class="card">
        <div class="text-center py-8 dark:text-[#a1a1aa]">Loading program details...</div>
    </div>
</div>

<script>
    const SLUG = '{{ slug }}';

    async function loadProgramDetail() {
        try {
            const resp = await fetch('/api/programs/' + SLUG);
            if (!resp.ok) {
                document.getElementById('program-detail-content').innerHTML = `
                    <div class="card"><div class="text-center py-8 text-red-400">Program not found: ${SLUG}</div></div>`;
                return;
            }
            const json = await resp.json();
            const p = json.data || {};
            renderProgram(p);
        } catch (err) {
            document.getElementById('program-detail-content').innerHTML = `
                <div class="card"><div class="text-center py-8 text-red-400">Error: ${err.message}</div></div>`;
        }
    }

    function renderProgram(p) {
        document.getElementById('program-name').textContent = p.name || p.slug;
        const container = document.getElementById('program-detail-content');

        container.innerHTML = `
            <!-- Info Cards -->
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
                <div class="card">
                    <span class="text-xs dark:text-[#a1a1aa] light:text-[#71717a]">Website</span>
                    <div class="text-sm mt-1">${p.website ? `<a href="${p.website}" target="_blank" class="text-vyper-400 hover:underline">${p.website}</a>` : '—'}</div>
                </div>
                <div class="card">
                    <span class="text-xs dark:text-[#a1a1aa] light:text-[#71717a]">Max Bounty</span>
                    <div class="text-sm font-medium mt-1">${p.max_bounty || '—'}</div>
                </div>
                <div class="card">
                    <span class="text-xs dark:text-[#a1a1aa] light:text-[#71717a]">Status</span>
                    <div class="mt-1">${statusBadge(p.status)}</div>
                </div>
            </div>

            <!-- Contracts -->
            <div class="card mb-6">
                <h3 class="font-semibold mb-4">Contracts</h3>
                ${p.contracts && p.contracts.length ? `
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead>
                            <tr>
                                <th class="table-header text-left">Address</th>
                                <th class="table-header text-left">Chain</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${p.contracts.map(c => `
                                <tr class="table-row">
                                    <td class="table-cell font-mono text-xs">${c.address || c}</td>
                                    <td class="table-cell">${c.chain || '—'}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>` : '<p class="text-sm dark:text-[#a1a1aa]">No contracts listed</p>'}
            </div>

            <!-- Repos -->
            <div class="card mb-6">
                <h3 class="font-semibold mb-4">Repositories</h3>
                ${p.repos && p.repos.length ? p.repos.map(r => `
                    <div class="text-sm text-vyper-400 hover:underline mb-1">
                        <a href="${typeof r === 'string' ? r : r.url}" target="_blank">${typeof r === 'string' ? r : r.name || r.url}</a>
                    </div>
                `).join('') : '<p class="text-sm dark:text-[#a1a1aa]">No repositories</p>'}
            </div>

            <!-- Chains -->
            <div class="card mb-6">
                <h3 class="font-semibold mb-4">Supported Chains</h3>
                <div class="flex flex-wrap gap-2">
                    ${(p.chains || []).map(c => `<span class="badge bg-blue-500/10 text-blue-400">${c}</span>`).join('')}
                    ${(!p.chains || p.chains.length === 0) ? '<p class="text-sm dark:text-[#a1a1aa]">No chains listed</p>' : ''}
                </div>
            </div>

            <!-- Audit History -->
            <div class="card">
                <h3 class="font-semibold mb-4">Audit History</h3>
                ${p.audit_history && p.audit_history.length ? `
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead>
                            <tr>
                                <th class="table-header text-left">Audit ID</th>
                                <th class="table-header text-left">Status</th>
                                <th class="table-header text-right">Findings</th>
                                <th class="table-header text-left">Date</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${p.audit_history.map(a => `
                                <tr class="table-row cursor-pointer" onclick="window.location='/audits/${a.audit_id}'">
                                    <td class="table-cell font-mono text-xs">${a.audit_id?.slice(0, 8)}...</td>
                                    <td class="table-cell">${statusBadge(a.state || 'PENDING')}</td>
                                    <td class="table-cell text-right">${a.findings_count ?? '—'}</td>
                                    <td class="table-cell text-xs">${a.created_at ? new Date(a.created_at).toLocaleDateString() : '—'}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>` : '<p class="text-sm dark:text-[#a1a1aa]">No audit history</p>'}
            </div>
        `;
    }

    function statusBadge(status) {
        const colors = {
            'active': 'bg-green-500/20 text-green-400',
            'inactive': 'bg-gray-500/20 text-gray-400',
            'paused': 'bg-yellow-500/20 text-yellow-400',
        };
        const color = colors[status] || 'bg-gray-500/20 text-gray-400';
        return `<span class="badge ${color}">${status || 'unknown'}</span>`;
    }

    document.addEventListener('DOMContentLoaded', loadProgramDetail);
</script>
{% endblock %}
