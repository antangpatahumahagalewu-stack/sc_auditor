{% extends "base.html" %}
{% block content %}

<div class="mb-6 flex items-center gap-3">
    <a href="/settings" class="text-sm dark:text-[#a1a1aa] light:text-[#71717a] hover:text-vyper-400">← Back to Settings</a>
    <span class="dark:text-[#3f3f46] light:text-[#d4d4d8]">/</span>
    <h2 class="text-2xl font-bold">Notification Settings</h2>
</div>

<form id="notifications-form" onsubmit="return saveNotifications(event)" class="space-y-6">
    <!-- Discord -->
    <div class="card">
        <h3 class="font-semibold mb-4 flex items-center gap-2">
            <svg class="w-5 h-5 text-indigo-400" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.3698a19.7913 19.7913 0 00-4.8851-1.5152.0741.0741 0 00-.0785.0371c-.211.3753-.4447.8648-.6083 1.2495-1.8447-.2762-3.68-.2762-5.4868 0-.1636-.3933-.4058-.8742-.6177-1.2495a.077.077 0 00-.0785-.037 19.7363 19.7363 0 00-4.8852 1.515.0699.0699 0 00-.0321.0277C.5334 9.0458-.319 13.5799.0992 18.0578a.0824.0824 0 00.0312.0561c2.0528 1.5076 4.0413 2.4228 5.9929 3.0294a.0777.0777 0 00.0842-.0276c.4616-.6304.8731-1.2952 1.226-1.9942a.076.076 0 00-.0416-.1057c-.6528-.2476-1.2743-.5495-1.8722-.8923a.077.077 0 01-.0076-.1277c.1258-.0943.2517-.1923.3718-.2914a.0743.0743 0 01.0776-.0105c3.9278 1.7933 8.18 1.7933 12.0614 0a.0739.0739 0 01.0785.0095c.1202.099.246.1981.3728.2924a.077.077 0 01-.0066.1276 12.2986 12.2986 0 01-1.873.8914.0766.0766 0 00-.0407.1067c.3604.698.7719 1.3628 1.225 1.9932a.076.076 0 00.0842.0286c1.961-.6067 3.9495-1.5219 6.0023-3.0294a.077.077 0 00.0313-.0552c.5004-5.177-.8382-9.6739-3.5485-13.6604a.061.061 0 00-.0312-.0286zM8.02 15.3312c-1.1825 0-2.1569-1.0857-2.1569-2.419 0-1.3332.9555-2.4189 2.157-2.4189 1.2108 0 2.1757 1.0952 2.1568 2.419 0 1.3332-.9555 2.4189-2.1569 2.4189zm7.9748 0c-1.1825 0-2.1569-1.0857-2.1569-2.419 0-1.3332.9554-2.4189 2.1569-2.4189 1.2108 0 2.1757 1.0952 2.1568 2.419 0 1.3332-.946 2.4189-2.1568 2.4189z"/></svg>
            Discord
        </h3>
        <div class="space-y-3">
            <div>
                <label class="block text-sm font-medium mb-1">Webhook URL</label>
                <input type="url" id="discord-webhook" class="input-field font-mono text-xs" placeholder="https://discord.com/api/webhooks/...">
            </div>
        </div>
    </div>

    <!-- Telegram -->
    <div class="card">
        <h3 class="font-semibold mb-4 flex items-center gap-2">
            <svg class="w-5 h-5 text-blue-400" viewBox="0 0 24 24" fill="currentColor"><path d="M11.944 0A12 12 0 000 12a12 12 0 0012 12 12 12 0 0012-12A12 12 0 0012 0a12 12 0 00-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 01.171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
            Telegram
        </h3>
        <div class="space-y-3">
            <div>
                <label class="block text-sm font-medium mb-1">Bot Token</label>
                <input type="password" id="telegram-token" class="input-field font-mono text-xs" placeholder="1234567890:ABCdefGHIjklMNOpqrsTUVwxyz">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Chat ID</label>
                <input type="text" id="telegram-chat-id" class="input-field font-mono text-xs" placeholder="-1001234567890">
            </div>
        </div>
    </div>

    <!-- Email -->
    <div class="card">
        <h3 class="font-semibold mb-4 flex items-center gap-2">
            <svg class="w-5 h-5 text-yellow-400" viewBox="0 0 20 20" fill="currentColor"><path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/><path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/></svg>
            Email (SMTP)
        </h3>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <div>
                <label class="block text-sm font-medium mb-1">SMTP Host</label>
                <input type="text" id="smtp-host" class="input-field" placeholder="smtp.gmail.com">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">SMTP Port</label>
                <input type="number" id="smtp-port" class="input-field" value="587">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Username</label>
                <input type="text" id="smtp-user" class="input-field" placeholder="user@gmail.com">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Password</label>
                <input type="password" id="smtp-password" class="input-field" placeholder="App password">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">From Address</label>
                <input type="email" id="email-from" class="input-field" placeholder="vyper@example.com">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">To Address</label>
                <input type="email" id="email-to" class="input-field" placeholder="admin@example.com">
            </div>
        </div>
    </div>

    <!-- Actions -->
    <div class="flex gap-3">
        <button type="submit" class="btn-primary">Save Settings</button>
        <button type="button" onclick="testNotification('discord')" class="btn-secondary">Test Discord</button>
        <button type="button" onclick="testNotification('telegram')" class="btn-secondary">Test Telegram</button>
        <button type="button" onclick="testNotification('email')" class="btn-secondary">Test Email</button>
    </div>
</form>

<script>
    async function loadNotificationConfig() {
        try {
            const resp = await fetch('/api/config');
            const json = await resp.json();
            const c = json.data || {};

            document.getElementById('discord-webhook').value = c.discord_webhook_url || '';
            document.getElementById('telegram-token').value = c.telegram_bot_token || '';
            document.getElementById('telegram-chat-id').value = c.telegram_chat_id || '';
            document.getElementById('smtp-host').value = c.smtp_host || '';
            document.getElementById('smtp-port').value = c.smtp_port || 587;
            document.getElementById('smtp-user').value = c.smtp_user || '';
            document.getElementById('smtp-password').value = c.smtp_password || '';
            document.getElementById('email-from').value = c.email_from || '';
            document.getElementById('email-to').value = c.email_to || '';
        } catch (err) {
            console.error('Load notification config error:', err);
        }
    }

    async function saveNotifications(event) {
        event.preventDefault();
        const config = {
            discord_webhook_url: document.getElementById('discord-webhook').value,
            telegram_bot_token: document.getElementById('telegram-token').value,
            telegram_chat_id: document.getElementById('telegram-chat-id').value,
            smtp_host: document.getElementById('smtp-host').value,
            smtp_port: parseInt(document.getElementById('smtp-port').value) || 587,
            smtp_user: document.getElementById('smtp-user').value,
            smtp_password: document.getElementById('smtp-password').value,
            email_from: document.getElementById('email-from').value,
            email_to: document.getElementById('email-to').value,
        };
        try {
            await fetch('/api/config/bulk', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ config }),
            });
        } catch (err) {
            console.error('Save notifications error:', err);
        }
    }

    async function testNotification(channel) {
        try {
            await fetch('/api/notifications/test', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ channel }),
            });
        } catch (err) {
            console.error('Test notification error:', err);
        }
    }

    document.addEventListener('DOMContentLoaded', loadNotificationConfig);
</script>
{% endblock %}
