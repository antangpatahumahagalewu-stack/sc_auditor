{% extends "base.html" %}
{% block content %}

<div class="mb-6 flex items-center gap-3">
    <a href="/audits" class="text-sm dark:text-[#a1a1aa] light:text-[#71717a] hover:text-vyper-400">← Back to Audits</a>
    <span class="dark:text-[#3f3f46] light:text-[#d4d4d8]">/</span>
    <h2 class="text-2xl font-bold font-mono text-sm">{{ audit_id }}</h2>
</div>

<div id="audit-detail-content">
    <!-- Loading State -->
    <div class="card">
        <div class="flex items-center justify-center py-12">
            <div class="text-center">
                <svg class="w-8 h-8 animate-spin mx-auto mb-3 text-vyper-400" viewBox="0 0 24 24" fill="none">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
                </svg>
                <p class="dark:text-[#a1a1aa] light:text-[#71717a]">Loading audit details...</p>
            </div>
        </div>
    </div>
</div>

<script>
    const AUDIT_ID = '{{ audit_id }}';

    async function loadAuditDetail() {
        try {
            const resp = await fetch('/api/audits/' + AUDIT_ID);
            if (!resp.ok) {
                document.getElementById('audit-detail-content').innerHTML = `
                    <div class="card">
                        <div class="text-center py-8">
                            <p class="text-red-400">Audit not found: ${AUDIT_ID}</p>
                            <a href="/audits" class="btn-secondary inline-block mt-4">Back to Audits</a>
                        </div>
                    </div>`;
                return;
            }
            const json = await resp.json();
            const a = json.data || {};
            renderAuditDetail(a);
        } catch (err) {
            document.getElementById('audit-detail-content').innerHTML = `
                <div class="card">
                    <div class="text-center py-8">
                        <p class="text-red-400">Error loading audit: ${err.message}</p>
                    </div>
                </div>`;
        }
    }

    function renderAuditDetail(a) {
        const container = document.getElementById('audit-detail-content');
        const steps = a.steps || [];
        const findings = a.findings || {};

        container.innerHTML = `
            <!-- Header Info -->
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
                <div class="card">
                    <span class="text-xs dark:text-[#a1a1aa] light:text-[#71717a]">Program</span>
                    <div class="text-sm font-medium mt-1">${a.program || '—'}</div>
                </div>
                <div class="card">
                    <span class="text-xs dark:text-[#a1a1aa] light:text-[#71717a]">Contract</span>
                    <div class="text-sm font-mono mt-1">${a.address || '—'}</div>
                </div>
                <div class="card">
                    <span class="text-xs dark:text-[#a1a1aa] light:text-[#71717a]">Chain</span>
                    <div class="text-sm font-medium mt-1">${a.chain || '—'}</div>
                </div>
                <div class="card">
                    <span class="text-xs dark:text-[#a1a1aa] light:text-[#71717a]">Created</span>
                    <div class="text-sm font-medium mt-1">${a.created_at ? new Date(a.created_at).toLocaleString() : '—'}</div>
                </div>
            </div>

            <!-- Status Timeline -->
            <div class="card mb-6">
                <h3 class="font-semibold mb-4">Pipeline Status</h3>
                <div class="flex items-center gap-2 mb-4">
                    <span class="text-sm font-medium">Current State:</span>
                    ${statusBadge(a.state || 'PENDING')}
                    ${a.duration_seconds ? `<span class="text-xs dark:text-[#a1a1aa] light:text-[#71717a] ml-2">Duration: ${formatDuration(a.duration_seconds)}</span>` : ''}
                </div>
                ${a.error ? `<div class="p-3 rounded-lg bg-red-500/10 text-red-400 text-sm mb-4">Error: ${a.error}</div>` : ''}
                <div class="space-y-2">
                    ${renderTimeline(steps)}
                </div>
            </div>

            <!-- Findings -->
            <div class="card mb-6">
                <h3 class="font-semibold mb-4">Findings</h3>
                ${findings && findings.length ? renderFindingsTable(findings) : '<p class="text-sm dark:text-[#a1a1aa]">No findings yet</p>'}
            </div>

            <!-- Metrics -->
            ${renderMetrics(a)}

            <!-- Actions -->
            <div class="card">
                <h3 class="font-semibold mb-4">Actions</h3>
                <div class="flex flex-wrap gap-3">
                    <button onclick="retryAudit()" class="btn-secondary">Re-run Audit</button>
                    <button onclick="window.location='/feedback'" class="btn-secondary">Submit Feedback</button>
                </div>
            </div>
        `;
    }

    function renderTimeline(steps) {
        if (!steps || steps.length === 0) return '<p class="text-sm dark:text-[#a1a1aa]">No steps recorded</p>';
        return steps.map(s => {
            const isActive = !s.completed_at && !s.error;
            const isError = !!s.error;
            const isDone = !!s.completed_at;
            return `
                <div class="flex items-start gap-3 p-3 rounded-lg dark:bg-[#18181b] light:bg-[#f4f4f5]">
                    <div class="w-2 h-2 rounded-full mt-1.5 flex-shrink-0 ${isActive ? 'bg-blue-400 animate-pulse' : isError ? 'bg-red-400' : isDone ? 'bg-green-400' : 'bg-gray-400'}"></div>
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2">
                            <span class="text-sm font-medium">${s.name || s.state || 'Unknown'}</span>
                            ${statusBadge(s.state || 'UNKNOWN')}
                        </div>
                        ${s.duration_seconds ? `<span class="text-xs dark:text-[#a1a1aa] light:text-[#71717a]">${formatDuration(s.duration_seconds)}</span>` : ''}
                        ${s.error ? `<p class="text-xs text-red-400 mt-1">${s.error}</p>` : ''}
                        ${s.started_at ? `<span class="text-xs dark:text-[#a1a1aa] light:text-[#71717a] block mt-0.5">Started: ${new Date(s.started_at).toLocaleTimeString()}</span>` : ''}
                    </div>
                </div>
            `;
        }).join('');
    }

    function renderFindingsTable(findings) {
        return `
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead>
                        <tr>
                            <th class="table-header text-left">ID</th>
                            <th class="table-header text-left">Severity</th>
                            <th class="table-header text-left">Tool</th>
                            <th class="table-header text-left">Title</th>
                            <th class="table-header text-left">Classification</th>
                            <th class="table-header text-left">Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${findings.map(f => `
                            <tr class="table-row">
                                <td class="table-cell font-mono text-xs">${f.finding_id?.slice(0, 8) || '—'}</td>
                                <td class="table-cell">${severityBadge(f.severity)}</td>
                                <td class="table-cell">${f.tool || '—'}</td>
                                <td class="table-cell max-w-[200px] truncate" title="${f.title || ''}">${f.title || '—'}</td>
                                <td class="table-cell">${classificationBadge(f.classification)}</td>
                                <td class="table-cell">${feedbackBadge(f.status)}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
        `;
    }

    function renderMetrics(a) {
        const m = a.metrics;
        if (!m) return '';
        return `
            <div class="card mb-6">
                <h3 class="font-semibold mb-4">Classification Metrics</h3>
                <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
                    <div class="text-center">
                        <div class="text-2xl font-bold text-green-400">${m.true_positives ?? '—'}</div>
                        <div class="text-xs dark:text-[#a1a1aa] light:text-[#71717a]">TP</div>
                    </div>
                    <div class="text-center">
                        <div class="text-2xl font-bold text-red-400">${m.false_positives ?? '—'}</div>
                        <div class="text-xs dark:text-[#a1a1aa] light:text-[#71717a]">FP</div>
                    </div>
                    <div class="text-center">
                        <div class="text-2xl font-bold text-blue-400">${m.true_negatives ?? '—'}</div>
                        <div class="text-xs dark:text-[#a1a1aa] light:text-[#71717a]">TN</div>
                    </div>
                    <div class="text-center">
                        <div class="text-2xl font-bold text-yellow-400">${m.false_negatives ?? '—'}</div>
                        <div class="text-xs dark:text-[#a1a1aa] light:text-[#71717a]">FN</div>
                    </div>
                </div>
                ${m.f1_score ? `
                <div class="mt-4 pt-4 border-t dark:border-[#27272a] light:border-[#e4e4e7]">
                    <div class="flex items-center gap-4 justify-center">
                        <span class="text-sm">F1 Score: <strong class="text-vyper-400">${(m.f1_score * 100).toFixed(1)}%</strong></span>
                        <span class="text-sm">Precision: <strong class="text-green-400">${(m.precision * 100).toFixed(1)}%</strong></span>
                        <span class="text-sm">Recall: <strong class="text-blue-400">${(m.recall * 100).toFixed(1)}%</strong></span>
                    </div>
                </div>` : ''}
            </div>
        `;
    }

    function statusBadge(state) {
        const colors = {
            'COMPLETED': 'bg-green-500/20 text-green-400',
            'PENDING': 'bg-yellow-500/20 text-yellow-400',
            'SCANNING': 'bg-purple-500/20 text-purple-400',
            'AI_ANALYSIS': 'bg-indigo-500/20 text-indigo-400',
            'CLASSIFYING': 'bg-cyan-500/20 text-cyan-400',
            'EXPLOITING': 'bg-orange-500/20 text-orange-400',
        };
        if (state?.endsWith('_FAILED') || state === 'TIMEOUT' || state === 'FAILED') {
            return '<span class="badge bg-red-500/20 text-red-400">' + state + '</span>';
        }
        const color = colors[state] || 'bg-gray-500/20 text-gray-400';
        return `<span class="badge ${color}">${state}</span>`;
    }

    function severityBadge(sev) {
        const colors = {
            'critical': 'bg-red-500/20 text-red-400',
            'high': 'bg-orange-500/20 text-orange-400',
            'medium': 'bg-yellow-500/20 text-yellow-400',
            'low': 'bg-blue-500/20 text-blue-400',
            'informational': 'bg-gray-500/20 text-gray-400',
        };
        const color = colors[sev] || 'bg-gray-500/20 text-gray-400';
        return `<span class="badge ${color}">${sev}</span>`;
    }

    function classificationBadge(cls) {
        const colors = {
            'true_positive': 'bg-green-500/20 text-green-400',
            'false_positive': 'bg-red-500/20 text-red-400',
            'true_negative': 'bg-blue-500/20 text-blue-400',
            'false_negative': 'bg-yellow-500/20 text-yellow-400',
        };
        const color = colors[cls] || 'bg-gray-500/20 text-gray-400';
        return `<span class="badge ${color}">${cls?.replace('_', ' ') || 'unknown'}</span>`;
    }

    function feedbackBadge(status) {
        const colors = {
            'confirmed_tp': 'bg-green-500/20 text-green-400',
            'rejected_fp': 'bg-red-500/20 text-red-400',
            'marked_fn': 'bg-yellow-500/20 text-yellow-400',
        };
        const color = colors[status] || 'bg-gray-500/20 text-gray-400';
        return `<span class="badge ${color}">${status || 'pending'}</span>`;
    }

    function formatDuration(sec) {
        if (!sec) return '—';
        if (sec < 60) return Math.round(sec) + 's';
        if (sec < 3600) return Math.floor(sec / 60) + 'm ' + Math.round(sec % 60) + 's';
        return Math.floor(sec / 3600) + 'h ' + Math.floor((sec % 3600) / 60) + 'm';
    }

    async function retryAudit() {
        try {
            await fetch('/api/audits/' + AUDIT_ID + '/retry', { method: 'POST' });
            loadAuditDetail();
        } catch (err) {
            console.error('Retry error:', err);
        }
    }

    document.addEventListener('DOMContentLoaded', loadAuditDetail);
</script>
{% endblock %}
