{% extends "base.html" %}
{% block content %}

<div class="mb-6">
    <h2 class="text-2xl font-bold">Feedback Management</h2>
    <p class="dark:text-[#a1a1aa] light:text-[#71717a] mt-1">User feedback and reclassification of findings</p>
</div>

<!-- Stats -->
<div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
    <div class="card">
        <span class="text-xs dark:text-[#a1a1aa] light:text-[#71717a]">Feedback Received</span>
        <div class="text-2xl font-bold" id="feedback-total">—</div>
    </div>
    <div class="card">
        <span class="text-xs dark:text-[#a1a1aa] light:text-[#71717a]">Accuracy Improvement</span>
        <div class="text-2xl font-bold text-green-400" id="feedback-improvement">—</div>
    </div>
    <div class="card">
        <span class="text-xs dark:text-[#a1a1aa] light:text-[#71717a]">Pending Review</span>
        <div class="text-2xl font-bold text-yellow-400" id="feedback-pending">—</div>
    </div>
</div>

<!-- Feedback Table -->
<div class="card">
    <div class="overflow-x-auto">
        <table class="w-full">
            <thead>
                <tr>
                    <th class="table-header text-left">Finding ID</th>
                    <th class="table-header text-left">Original</th>
                    <th class="table-header text-left">Feedback</th>
                    <th class="table-header text-left">Status</th>
                    <th class="table-header text-left">Date</th>
                    <th class="table-header text-left">Actions</th>
                </tr>
            </thead>
            <tbody id="feedback-body">
                <tr class="table-row">
                    <td class="table-cell" colspan="6" class="text-center dark:text-[#a1a1aa]">Loading feedback...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    async function loadFeedback() {
        try {
            const [feedbackResp, metricsResp] = await Promise.all([
                fetch('/api/feedback'),
                fetch('/api/metrics'),
            ]);

            const feedback = await feedbackResp.json();
            const metrics = await metricsResp.json();
            const items = feedback.data || [];
            const m = metrics.data || {};

            // Stats
            document.getElementById('feedback-total').textContent = items.length;
            document.getElementById('feedback-improvement').textContent = m.f1_score ? '+' + ((m.f1_score * 100).toFixed(1)) + '%' : '—';
            document.getElementById('feedback-pending').textContent = items.filter(i => i.status === 'pending_review' || i.status === 'unknown').length;

            // Table
            const tbody = document.getElementById('feedback-body');
            if (items.length === 0) {
                tbody.innerHTML = '<tr class="table-row"><td class="table-cell" colspan="6" class="text-center dark:text-[#a1a1aa]">No feedback yet</td></tr>';
                return;
            }

            tbody.innerHTML = items.map(f => `
                <tr class="table-row">
                    <td class="table-cell font-mono text-xs">${f.finding_id?.slice(0, 12) || '—'}</td>
                    <td class="table-cell">${classificationBadge(f.original_classification)}</td>
                    <td class="table-cell max-w-[200px] truncate text-sm">${f.user_feedback || '—'}</td>
                    <td class="table-cell">${statusBadge(f.status)}</td>
                    <td class="table-cell text-xs">${f.created_at ? new Date(f.created_at).toLocaleDateString() : '—'}</td>
                    <td class="table-cell">
                        <div class="flex gap-1">
                            <button onclick="submitFeedback('${f.finding_id}', 'confirmed_tp')" class="text-xs px-2 py-1 rounded bg-green-500/20 text-green-400 hover:bg-green-500/30">Confirm TP</button>
                            <button onclick="submitFeedback('${f.finding_id}', 'rejected_fp')" class="text-xs px-2 py-1 rounded bg-red-500/20 text-red-400 hover:bg-red-500/30">Reject FP</button>
                            <button onclick="submitFeedback('${f.finding_id}', 'marked_fn')" class="text-xs px-2 py-1 rounded bg-yellow-500/20 text-yellow-400 hover:bg-yellow-500/30">Mark FN</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        } catch (err) {
            console.error('Load feedback error:', err);
        }
    }

    function classificationBadge(cls) {
        const colors = {
            'true_positive': 'bg-green-500/20 text-green-400',
            'false_positive': 'bg-red-500/20 text-red-400',
            'true_negative': 'bg-blue-500/20 text-blue-400',
            'false_negative': 'bg-yellow-500/20 text-yellow-400',
            'unknown': 'bg-gray-500/20 text-gray-400',
        };
        const color = colors[cls] || 'bg-gray-500/20 text-gray-400';
        return `<span class="badge ${color}">${cls?.replace(/_/g, ' ') || 'unknown'}</span>`;
    }

    function statusBadge(status) {
        const colors = {
            'confirmed_tp': 'bg-green-500/20 text-green-400',
            'rejected_fp': 'bg-red-500/20 text-red-400',
            'marked_fn': 'bg-yellow-500/20 text-yellow-400',
            'pending_review': 'bg-blue-500/20 text-blue-400',
            'unknown': 'bg-gray-500/20 text-gray-400',
        };
        const color = colors[status] || 'bg-gray-500/20 text-gray-400';
        return `<span class="badge ${color}">${status?.replace(/_/g, ' ') || 'unknown'}</span>`;
    }

    async function submitFeedback(findingId, status) {
        try {
            await fetch('/api/feedback', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    finding_id: findingId,
                    feedback: 'User action: ' + status,
                    status: status,
                }),
            });
            loadFeedback();  // Refresh
        } catch (err) {
            console.error('Submit feedback error:', err);
        }
    }

    document.addEventListener('DOMContentLoaded', loadFeedback);
</script>
{% endblock %}
