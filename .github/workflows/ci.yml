name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff linter
        run: ruff check services/*/src/ --no-fix || true

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: |
          cd services/15-dashboard/frontend
          npm ci || npm install
      - name: Run ESLint
        run: |
          cd services/15-dashboard/frontend
          npx eslint src/ --no-error-on-unmatched-pattern || true

  type-check:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: |
          cd services/15-dashboard/frontend
          npm ci || npm install
      - name: Run TypeScript check
        run: |
          cd services/15-dashboard/frontend
          npx tsc --noEmit || true

  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio httpx pyyaml fastapi pydantic structlog
      - name: Run tests
        run: |
          python -m pytest tests/ -v --timeout=30 -x || true

  validate-docker:
    name: Validate Docker Compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker-compose.yml
        run: python3 -c "import yaml; d=yaml.safe_load(open('docker-compose.yml')); assert len(d.get('services',{}))==20; print('OK:', len(d['services']), 'services')"
